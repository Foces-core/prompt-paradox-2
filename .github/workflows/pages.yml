name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify Convex Config
        run: |
          if [ -z "${{ secrets.CONVEX_DEPLOY_KEY }}" ]; then
            echo "::error::CONVEX_DEPLOY_KEY is not configured in GitHub Secrets. Deploy cannot proceed."
            exit 1
          fi

      - name: Deploy Convex Backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm exec convex deploy

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: /prompt-paradox-2
          NEXT_PUBLIC_CONVEX_URL: https://proper-goshawk-251.convex.cloud
        run: pnpm run build

      - name: Add nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
